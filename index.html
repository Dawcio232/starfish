<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starfish Project</title>
<style>
/* Wszystkie Twoje style zostają bez zmian */
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg,#0f0f23 0%,#1a1a2e 50%,#16213e 100%); color: #e0e0e0; min-height:100vh; overflow-x:hidden;}
/* ... (reszta stylów jak w Twoim pliku) ... */
</style>
</head>
<body>
<div id="site-offline" class="site-offline">
    <div class="offline-message">🔒 Strona zamknięta 🔒</div>
    <div class="offline-message-subtitle">Strona została zamknięta przez Admina!</div>
    <button class="admin-reopen-btn" onclick="openAdminPanelFromOffline()">Admin</button>
</div>

<div class="site-status" id="site-status">🟢 Online</div>

<div class="container">
    <div class="header">
        <h1>Starfish Project</h1>
        <p class="subtitle">Zasoby dziwnej osoby @Dawcio232</p>
    </div>

    <div class="categories">
        <div class="category gaming">
            <div class="category-title"><span class="category-icon">🎮</span>Granie</div>
            <div id="gaming-links"><div class="empty-state">No gaming links available yet.</div></div>
        </div>

        <div class="category programming">
            <div class="category-title"><span class="category-icon">💻</span>Programowanie</div>
            <div id="programming-links"><div class="empty-state">No programming links available yet.</div></div>
        </div>
    </div>
</div>

<div class="secret-access" onclick="openAdminPanel()">🔐 Admin</div>

<div id="admin-panel" class="admin-panel">
<div class="admin-content">
    <!-- Sekcja kodu -->
    <div id="code-section">
        <h2 style="text-align:center;color:#4ecdc4;margin-bottom:20px;">Wpisz kod</h2>
        <input type="password" id="access-code" class="code-input" placeholder="••••" maxlength="4">
        <div style="text-align:center;">
            <button class="btn" onclick="checkCode()">Access</button>
            <button class="btn back-btn" onclick="closeAdminPanel()">Cancel</button>
        </div>
        <div id="error-message" class="error-message"></div>
    </div>

    <!-- Menu admina -->
    <div id="admin-menu" class="admin-menu">
        <div class="access-granted">✅ Kod pomyślnie wgrany!</div>
        <h2>Admin Control Panel</h2>
        <div class="menu-buttons">
            <button class="menu-btn" onclick="showAddForm()"><span class="menu-btn-icon">➕</span>Dodaj</button>
            <button class="menu-btn" onclick="toggleDeleteMode()"><span class="menu-btn-icon">🗑️</span>USUŃ (ND)</button>
            <button class="menu-btn" onclick="refreshConfig()">Odśwież status</button>
        </div>
        <button class="btn back-btn" onclick="closeAdminPanel()">Close Panel</button>
    </div>

    <!-- Dodawanie zakładek -->
    <div id="add-section" class="add-form">
        <h3 style="margin-bottom:20px;color:#4ecdc4;">Add New Bookmark</h3>
        <div class="form-group"><label for="title">Title:</label><input type="text" id="title" placeholder="Enter bookmark title"></div>
        <div class="form-group"><label for="url">URL:</label><input type="url" id="url" placeholder="https://example.com"></div>
        <div class="form-group"><label for="category">Category:</label>
            <select id="category">
                <option value="gaming">🎮 Gaming</option>
                <option value="programming">💻 Programming</option>
            </select>
        </div>
        <button class="btn" onclick="addBookmark()">Add Bookmark</button
